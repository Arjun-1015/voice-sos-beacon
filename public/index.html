<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice SOS Beacon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body data-state="idle">

  <main class="panel">

    <header class="panel__header">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="status-label" id="stateLabel">STANDBY</span>
    </header>

    <p class="eyebrow">Personal Safety Device</p>
    <h1>Voice SOS Beacon</h1>

    <p class="instructions">
      Say one of the trigger words below. A countdown gives you a window to
      cancel before help is alerted.
    </p>

    <ul class="plate" id="keywordPlate">
      <li>HELP</li><li>SOS</li><li>EMERGENCY</li><li>MAYDAY</li>
    </ul>

    <div class="controls">
      <button id="startBtn" class="btn btn--primary" onclick="startListening()">Start Listening</button>
      <button id="cancelBtn" class="btn btn--alarm" onclick="cancelSOS()">Cancel SOS</button>
    </div>

    <div id="status" class="readout-status">Idle</div>
    <div id="countdown" class="readout-countdown"></div>

    <section class="log-section">
      <h2 class="log-section__title">Event Log</h2>
      <div id="log" class="log"></div>
    </section>

  </main>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────
    const KEYWORDS   = ['help', 'sos', 'emergency', 'mayday'];
    const DELAY_MS   = 5000;   // milliseconds before triggering
    const CONTACTS   = ['+919431891119'];   // replace with real numbers
    // ─────────────────────────────────────────────────────────────

    // Keep the visible keyword plate in sync with the actual config above,
    // so the UI never drifts out of date if KEYWORDS changes.
    const plateEl = document.getElementById('keywordPlate');
    if (plateEl) {
      plateEl.innerHTML = KEYWORDS.map(kw => `<li>${kw.toUpperCase()}</li>`).join('');
    }

    let recognition, countdownTimer, countdownInterval;
    let triggered = false;

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML = `<div>${new Date().toLocaleTimeString()}: ${msg}</div>` + el.innerHTML;
    }

    // Drives the status dot + label in the panel header.
    function setState(state, label) {
      document.body.dataset.state = state;
      const lbl = document.getElementById('stateLabel');
      if (lbl) lbl.textContent = label;
    }

    function startListening() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert('Web Speech API not supported. Use Chrome or Edge.');
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous   = true;
      recognition.interimResults = true;
      recognition.lang         = 'en-US';

      recognition.onstart = () => {
        document.getElementById('status').textContent = '🎤 Listening…';
        document.getElementById('startBtn').disabled = true;
        setState('listening', 'LISTENING');
        log('Recognition started');
      };

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript.toLowerCase().trim();
          log(`Heard: "${transcript}"`);
          if (KEYWORDS.some(kw => transcript.includes(kw))) {
            startSOSCountdown();
          }
        }
      };

      recognition.onerror = (e) => log(`Error: ${e.error}`);
      recognition.onend   = () => {
        if (!triggered) recognition.start(); // auto-restart
      };

      recognition.start();
    }

    function startSOSCountdown() {
      if (triggered) return;
      triggered = true;
      setState('countdown', 'COUNTDOWN');

      let remaining = DELAY_MS / 1000;
      const countdownEl = document.getElementById('countdown');
      const cancelBtn   = document.getElementById('cancelBtn');

      countdownEl.style.display = 'block';
      cancelBtn.style.display   = 'inline-block';
      document.getElementById('status').textContent = '⚠️ SOS keyword detected!';

      countdownEl.textContent = remaining;

      countdownInterval = setInterval(() => {
        remaining--;
        countdownEl.textContent = remaining;
        if (remaining <= 0) clearInterval(countdownInterval);
      }, 1000);

      countdownTimer = setTimeout(() => {
        triggerSOS();
      }, DELAY_MS);
    }

    function cancelSOS() {
      clearTimeout(countdownTimer);
      clearInterval(countdownInterval);
      triggered = false;
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('status').textContent = '✅ SOS cancelled — still listening';
      setState('listening', 'LISTENING');
      log('SOS cancelled by user');
    }

    async function triggerSOS() {
      setState('alarm', 'ALARM SENT');
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('status').textContent = '🆘 SOS TRIGGERED!';
      log('SOS triggered!');

      // 1. Get GPS location
      getLocation(async (coords) => {
        const locationStr = coords
          ? `https://maps.google.com/?q=${coords.lat},${coords.lng}`
          : 'Location unavailable';

        log(`Location: ${locationStr}`);

        // 2. Play alarm
        playAlarm();

        // 3. Send SMS (requires backend — see server.js)
        await sendSMSAlert(CONTACTS, locationStr);
      });
    }

    function getLocation(callback) {
      if (!navigator.geolocation) return callback(null);
      navigator.geolocation.getCurrentPosition(
        (pos) => callback({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        () => callback(null),
        { timeout: 5000 }
      );
    }

    function playAlarm() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const playBeep = (freq, start, duration) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
        osc.start(ctx.currentTime + start);
        osc.stop(ctx.currentTime + start + duration);
      };
      // Three rising beeps
      for (let i = 0; i < 3; i++) {
        playBeep(880, i * 0.5, 0.4);
        playBeep(1320, i * 0.5 + 0.2, 0.3);
      }
    }

    async function sendSMSAlert(contacts, location) {
      // Calls your Node.js backend (server.js)
      try {
        const res = await fetch('/api/send-sos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contacts, location, timestamp: new Date().toISOString() })
        });
        const data = await res.json();
        log(`SMS sent: ${data.status}`);
      } catch (e) {
        log(`SMS failed (no backend?): ${e.message}`);
      }
    }
  </script>
</body>
</html>
